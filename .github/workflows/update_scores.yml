name: WM 2026 Score Update

on:
  schedule:
    # Alle 2 Stunden während der WM (11.06. – 19.07.2026)
    - cron: '17 */2 * * *'
  workflow_dispatch:  # Manueller Start jederzeit möglich

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Service Account anlegen
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Ergebnisse holen & Rangliste hochladen
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -X utf8 fetch_scores.py --publish

      - name: Service Account aufräumen
        if: always()
        run: rm -f service_account.json
