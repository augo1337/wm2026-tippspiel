name: WM 2026 Score Update

on:
  workflow_dispatch:  # Nur noch manueller Start (WM beendet)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Ergebnisse holen & Rangliste erstellen
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -X utf8 fetch_scores.py

      - name: Rangliste committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rangliste.html Ergebnisse.xlsx live_scores.json 2>/dev/null || true
          git diff --cached --quiet && git diff -- live_scores.json --quiet || git commit -m "Auto-Update: Rangliste $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase || true
          git push || true
