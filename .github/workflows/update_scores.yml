name: WM 2026 Score Update

on:
  schedule:
    # Alle 15 min während der WM-Gruppenphase (11.–30. Juni)
    - cron: '*/15 * 11-30 6 *'
    # Alle 15 min während der WM-KO-Phase (1.–19. Juli)
    - cron: '*/15 * 1-19 7 *'
  workflow_dispatch:  # Manueller Start jederzeit möglich

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Ergebnisse holen & Rangliste erstellen
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -X utf8 fetch_scores.py

      - name: Rangliste committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rangliste.html Ergebnisse.xlsx 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto-Update: Rangliste $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push || true
